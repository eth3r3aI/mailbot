services:
  postgres:
    image: postgres:16
    container_name: mailbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mailbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mailbot-postgres-data:/var/lib/postgresql/data

volumes:
  mailbot-postgres-data:
